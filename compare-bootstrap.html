<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap — comparison pane</title>
  <script>
    // Sync the theme BEFORE first paint. The parent passes it via the src #hash;
    // setting color-scheme here makes the browser paint this iframe's canvas
    // in-theme immediately, instead of flashing the default white (which shows as
    // a hard border above the legend) until Bootstrap's CDN CSS arrives.
    (function () {
      var t = location.hash.slice(1) === 'light' ? 'light' : 'dark';
      var r = document.documentElement;
      r.setAttribute('data-bs-theme', t);
      r.style.colorScheme = t;
      r.style.background = t === 'dark' ? '#121212' : '#ffffff';
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { margin: 0; padding: 1rem; font-family: system-ui, sans-serif; }
    .form-label { margin: .75rem 0 .35rem; font-size: .9rem; }
    .form-label:first-of-type { margin-top: 0; }
  </style>
</head>
<body>
  <label for="email" class="form-label">Email</label>
  <input id="email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="off">

  <label for="pw" class="form-label">Password (min 6)</label>
  <input id="pw" type="password" class="form-control" placeholder="Enter password" minlength="6" required autocomplete="off">

  <script>
    // Bootstrap has no pure-CSS live validation, so we drive it in JS — its usual
    // live pattern: toggle .is-valid / .is-invalid from the native checkValidity().
    document.querySelectorAll('.form-control').forEach(function (el) {
      function update() {
        if (el.value === '') { el.classList.remove('is-valid', 'is-invalid'); return; }
        var ok = el.checkValidity();
        el.classList.toggle('is-valid', ok);
        el.classList.toggle('is-invalid', !ok);
      }
      el.addEventListener('input', update);
      el.addEventListener('blur', update);
    });

    // Follow the parent demo's live light/dark toggle after load.
    window.addEventListener('message', function (e) {
      var mode = e.data && e.data.theme;
      if (mode !== 'dark' && mode !== 'light') return;
      var r = document.documentElement;
      r.setAttribute('data-bs-theme', mode);
      r.style.colorScheme = mode;
      r.style.background = mode === 'dark' ? '#121212' : '#ffffff';
    });
  </script>
</body>
</html>
