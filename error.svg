<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  width="24"
  height="24"
  role="img"
  aria-label="Invalid input"
>
  <!-- Two-tone bold cross: bright fill over a slightly wider darker outline so a
       thin same-hue border reads around it — same treatment as the valid tick. -->
  <path
    d="M6 6 18 18 M18 6 6 18"
    fill="none"
    stroke="#b30000"
    stroke-width="4"
    stroke-linecap="round"
  />
  <path
    d="M6 6 18 18 M18 6 6 18"
    fill="none"
    stroke="#e60000"
    stroke-width="2.5"
    stroke-linecap="round"
  />
</svg>
