<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>bench: Bulma validation states</title>
  <link rel="stylesheet" href="https://unpkg.com/bulma@1.0.2/css/bulma.min.css">
  <style>body{background:#fff;padding:1rem}input{display:block;margin:8px 0;width:280px}</style>
</head>
<body>
  <!-- Bulma's own state classes; we read the rendered border colours. -->
  <input id="invalid" class="input is-danger" value="x">
  <input id="valid" class="input is-success" value="ok@ok.co">
</body>
</html>
