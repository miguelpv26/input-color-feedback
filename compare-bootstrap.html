<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap — comparison pane</title>

  <!-- Belt-and-suspenders CSP for this frame (the parent also sandboxes it and
       _headers sets an HTTP-level CSP where the host supports it). Everything
       this frame needs is same-origin; the only non-'self' source is data:
       URIs for Bootstrap's inline validation icons. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; img-src data:; script-src 'self'; base-uri 'none'; form-action 'none'">

  <!-- Loaded in <head> before the stylesheets so it can set the theme before
       first paint (avoids a white flash before Bootstrap's CSS applies). -->
  <script src="compare-bootstrap.js"></script>

  <!-- Real Bootstrap 5.3.3, self-hosted (no third-party/CDN request). -->
  <link rel="stylesheet" href="bootstrap-5.3.3.min.css">
  <link rel="stylesheet" href="compare-bootstrap.css">
</head>
<body>
  <label for="email" class="form-label">Email</label>
  <input id="email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="off">

  <label for="pw" class="form-label">Password (min 6)</label>
  <input id="pw" type="password" class="form-control" placeholder="Enter password" minlength="6" required autocomplete="off">
</body>
</html>
